    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Cartera Inteligente — Análisis de inversiones en criptomonedas, acciones, ETFs y más con indicadores técnicos e IA" />

    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="apple-touch-icon" sizes="192x192" href="/icon.png" />
    <title>Cartera Inteligente</title>
    <style>
      /* Splash / initial load */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
        background: #0a0e17;
      }
      #root:empty::after {
        content: '📊';
        font-size: 48px;
        animation: splash-pulse 1.2s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.1); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
